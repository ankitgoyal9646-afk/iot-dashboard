<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankit's Pro IoT Hub - Analytics</title>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; text-align: center; margin: 0; padding: 10px; }
        .stats-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; width: 120px; border-bottom: 4px solid #38bdf8; }
        .value { font-size: 1.8rem; font-weight: bold; color: #38bdf8; }
        .chart-box { background: #1e293b; padding: 15px; border-radius: 20px; max-width: 800px; margin: 15px auto; height: 300px; }
        
        /* LED Control Card */
        .led-card { background: #1e293b; padding: 20px; border-radius: 15px; max-width: 250px; margin: 15px auto; border: 2px solid #eab308; box-shadow: 0 4px 15px rgba(234, 179, 8, 0.2); }
        #ledBtn { width: 100%; font-size: 1.1rem; background: #475569; margin-top: 10px; }

        /* Filter Styles */
        .filter-box { background: #1e293b; padding: 15px; border-radius: 12px; max-width: 500px; margin: 10px auto; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; border: 1px solid #334155; }
        input[type="datetime-local"] { padding: 8px; border-radius: 5px; border: none; background: #0f172a; color: white; font-size: 0.8rem; }
        
        .btn { border: none; padding: 10px 18px; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; font-size: 0.8rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; justify-content: center; }
        
        /* Side Drawer */
        .side-drawer { position: fixed; top: 0; right: -420px; width: 420px; height: 100%; background: #1e293b; transition: 0.4s; z-index: 1000; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        .side-drawer.open { right: 0; }
        .table-container { flex: 1; overflow-y: auto; padding: 10px 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { border: 1px solid #334155; padding: 10px; text-align: center; }
        th { background: #0f172a; color: #38bdf8; position: sticky; top: 0; }
    </style>
</head>
<body>

    <h3>🌍 Live IoT Dashboard (IST)</h3>

    <div class="stats-row">
        <div class="card" style="border-color:#f43f5e">Temp<div class="value" id="v-t">--</div><small>°C</small></div>
        <div class="card" style="border-color:#38bdf8">Hum<div class="value" id="v-h">--</div><small>%</small></div>
    </div>

    <div class="chart-box"><canvas id="myChart"></canvas></div>

    <div class="led-card">
        <div><i class="fa-solid fa-lightbulb"></i> <b>LED REMOTE</b></div>
        <button id="ledBtn" class="btn" onclick="toggleLED()">OFF</button>
    </div>

    <div class="filter-box">
        <div><small>From:</small><br><input type="datetime-local" id="startTime"></div>
        <div><small>To:</small><br><input type="datetime-local" id="endTime"></div>
        <button class="btn" style="background:#3b82f6; margin-top:15px;" onclick="fetchHistory(true)"><i class="fa-solid fa-filter"></i> FILTER HISTORY</button>
    </div>

    <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
        <button class="btn" style="background:#22c55e" onclick="downloadFullReport()"><i class="fa-solid fa-file-csv"></i> DOWNLOAD CSV (ALL)</button>
        <button class="btn" style="background:#f43f5e" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> REFRESH HUB</button>
    </div>

    <div id="historyDrawer" class="side-drawer">
        <div style="padding:20px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #334155;">
            <h3>IST Data Logs</h3>
            <i class="fa-solid fa-circle-xmark" style="font-size:1.5rem; cursor:pointer; color:#f43f5e" onclick="closeHistory()"></i>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Time (IST)</th>
                        <th>Temp</th>
                        <th>Hum</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const RENDER_URL = "https://ankit-iot-hub.onrender.com";
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbynxCqhPehBb3rX49W2azvZmV4p_u0rKSFkffdfm9G3LpCxw6VhIJg6iDBtPT4dVKM7Ww/exec";
        
        // Chart Setup
        var labels = [], temps = [], hums = [];
        var chart = new Chart(document.getElementById('myChart'), {
            type: 'line',
            data: { labels: [], datasets: [
                {label:'Temp', borderColor:'#f43f5e', data:[], tension: 0.4, fill: false},
                {label:'Hum', borderColor:'#38bdf8', data:[], tension: 0.4, fill: false}
            ]},
            options: { 
                maintainAspectRatio: false, 
                scales: { y: { beginAtZero: false } },
                animation: false 
            }
        });

        // Socket Connection
        const socket = io(RENDER_URL, { transports: ['websocket', 'polling'] });
        
        socket.on("iot_update", (data) => {
            const time = new Date().toLocaleTimeString('en-IN', { hour12: false });
            const val = parseFloat(data.val);

            if(data.type === 'temp') {
                document.getElementById('v-t').innerText = val.toFixed(1);
                temps.push(val);
                labels.push(time);
            }
            if(data.type === 'hum') {
                document.getElementById('v-h').innerText = val.toFixed(1);
                hums.push(val);
            }
            
            if(labels.length > 15) { labels.shift(); temps.shift(); hums.shift(); }
            
            chart.data.labels = labels;
            chart.data.datasets[0].data = temps;
            chart.data.datasets[1].data = hums;
            chart.update('none');
        });

        // LED Remote Logic
        let ledState = "OFF";
        function toggleLED() {
            ledState = (ledState === "OFF") ? "ON" : "OFF";
            const btn = document.getElementById('ledBtn');
            btn.innerText = ledState;
            btn.style.background = (ledState === "ON") ? "#eab308" : "#475569";
            btn.style.color = (ledState === "ON") ? "black" : "white";
            socket.emit('led_command', ledState);
        }

        // Optimized History Fetch
        async function fetchHistory(isFilter = false) {
            const body = document.getElementById('historyBody');
            document.getElementById('historyDrawer').classList.add('open');
            body.innerHTML = "<tr><td colspan='4'>⌛ Fetching Data...</td></tr>";

            let fetchUrl = SCRIPT_URL;
            if(isFilter) {
                const start = document.getElementById('startTime').value;
                const end = document.getElementById('endTime').value;
                if(!start || !end) { alert("Please select both dates"); return; }
                fetchUrl += `?start=${start}&end=${end}`;
            }

            try {
                const res = await fetch(fetchUrl);
                const data = await res.json();
                body.innerHTML = "";
                if(!data || data.length === 0) {
                    body.innerHTML = "<tr><td colspan='4'>No Data Found</td></tr>";
                    return;
                }
                
                // Show latest data on top
                const displayData = data.length > 200 ? data.slice(-200) : data;
                displayData.reverse().forEach(r => {
                    let st = r.status || "Sensor Log";
                    let rowColor = st.includes("LED") ? "style='background: rgba(234, 179, 8, 0.05)'" : "";
                    let stColor = st.includes("ON") ? "#22c55e" : (st.includes("OFF") ? "#f43f5e" : "#38bdf8");

                    body.innerHTML += `<tr ${rowColor}>
                        <td>${r.time}</td>
                        <td>${r.temp !== "--" ? parseFloat(r.temp).toFixed(1) + "°C" : "--"}</td>
                        <td>${r.hum !== "--" ? parseFloat(r.hum).toFixed(1) + "%" : "--"}</td>
                        <td style="color:${stColor}; font-weight:bold;">${st}</td>
                    </tr>`;
                });
            } catch(e) { body.innerHTML = "<tr><td colspan='4' style='color:red'>Fetch Error!</td></tr>"; }
        }

        async function downloadFullReport() {
            alert("Generating Full Report... Please wait.");
            try {
                const res = await fetch(SCRIPT_URL + "?mode=all");
                const data = await res.json();
                let csv = "\ufeffTime (IST),Temperature (C),Humidity (%),Status\n";
                data.forEach(r => {
                    csv += `"${r.time}",${r.temp},${r.hum},${r.status || "N/A"}\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `IoT_Full_Report_${new Date().toLocaleDateString()}.csv`;
                link.click();
            } catch(e) { alert("Download failed. Check internet."); }
        }

        function closeHistory() { document.getElementById('historyDrawer').classList.remove('open'); }
    </script>
</body>
</html>
